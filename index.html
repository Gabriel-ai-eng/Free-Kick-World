<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Free Kick World ⚽</title>
<link rel="stylesheet" href="css/game.css" />
</head>
<body>
<canvas id="cv"></canvas>

<!-- Voltar para a Home -->
<button id="backBtn">← Voltar</button>

<!-- Conta logada (sair) -->
<button id="authStatus" class="hidden"><span id="authEmail"></span> · Sair</button>

<!-- Gire o celular -->
<div id="rotate">
  <div class="phone"></div>
  <h2>VIRE O CELULAR</h2>
</div>

<!-- HUD -->
<div id="hud">
  <div class="chip">⚽ GOLS: <span id="score">0</span></div>
  <div class="chip half" id="half" style="display:none">1º TEMPO</div>
  <div class="chip time">⏱ <span id="time">60</span></div>
</div>
<div id="msg"></div>

<!-- Controles -->
<div id="pad">
  <div id="zoom">
    <button id="camToggle">🔍 Perto</button>
  </div>
  <div id="stick"><div id="knob"></div></div>
  <div id="jump" class="actbtn">PULAR</div>
  <div id="kick" class="actbtn">CHUTAR</div>
</div>

<!-- TÍTULO (arte cheia do FKW + hotspots sobre JOGAR / INICIAR) -->
<div id="scrTitle" class="screen">
  <div id="titleWrap">
    <img id="titleImg" src="assets/fkw-title.jpg" alt="Free Kick World" decoding="async" fetchpriority="high" />
    <button class="hotspot" id="startGame" aria-label="Jogar"></button>
    <button class="hotspot" id="startQuick" aria-label="Iniciar partida rápida"></button>
  </div>
</div>

<!-- LOGIN (entrar com a conta do Alps para salvar o progresso) -->
<div id="scrLogin" class="screen hidden">
  <h1 style="color:#7dd3fc">FREE KICK WORLD</h1>
  <p class="sub">Entre com sua conta do Alps para salvar seu progresso e recorde.</p>
  <form id="loginForm" class="loginForm" autocomplete="on">
    <input id="loginEmail" type="email" inputmode="email" autocomplete="username"
           placeholder="seu@email.com" required />
    <input id="loginPass" type="password" autocomplete="current-password"
           placeholder="senha" required />
    <div id="loginErr" class="loginErr"></div>
    <button class="btn" id="loginBtn" type="submit">ENTRAR</button>
  </form>
  <button class="btn ghost" id="playGuest" type="button">Jogar sem salvar</button>
  <small class="hint">Use o mesmo e-mail e senha do app Alps (alpsprime.com.br).</small>
</div>

<!-- FIM -->
<div id="scrEnd" class="screen hidden">
  <h1 style="color:#fcd34d">FIM DE JOGO</h1>
  <h2 id="endScore">Você marcou 0 gols!</h2>
  <div class="row">
    <button class="btn" id="playAgain">JOGAR DE NOVO</button>
  </div>
</div>

<!-- TABELA (placeholder — conteúdo virá depois) -->
<div id="scrTabela" class="screen hidden">
  <h1 style="color:#7dd3fc">TABELA</h1>
  <h2>Em breve 📊</h2>
  <p class="sub">A classificação vai aparecer aqui em breve.</p>
  <button class="btn ghost" id="tabelaBack">VOLTAR</button>
</div>

<!-- Config do Supabase (gerada pelo Vite a partir das env do app) + cliente supabase-js -->
<script src="supabase-config.js"></script>
<script src="vendor/supabase.min.js"></script>

<!-- Jogo dividido por assunto. A ORDEM importa: cada arquivo usa o que os
     anteriores definiram (todos compartilham o mesmo escopo global). -->
<script src="js/core.js"></script>
<script src="js/assets.js"></script>
<script src="js/sprites.js"></script>
<script src="js/field.js"></script>
<script src="js/stadium.js"></script>
<script src="js/state.js"></script>
<script src="js/camera.js"></script>
<script src="js/screens.js"></script>
<script src="js/input.js"></script>
<script src="js/gameplay.js"></script>
<script src="js/render.js"></script>
<script src="js/persistence.js"></script>
<script src="js/loop.js"></script>
</body>
</html>
