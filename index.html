<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<!-- Acesso canônico: o jogo só deve rodar sob o domínio da plataforma
     (alpsprime.com.br/fkw/) — mesma origem em que a sessão de login já existe.
     Se alguém abrir o domínio "cru" da Vercel (*.vercel.app), mandamos para o
     caminho oficial. Roda no navegador do usuário, então NÃO afeta o proxy
     interno do AlpsPrime (que só busca o HTML no servidor, sem rodar JS). -->
<script>
  if (location.hostname.endsWith(".vercel.app")) {
    location.replace("https://www.alpsprime.com.br/fkw/" + location.search + location.hash);
  }
</script>
<!-- viewport-fit=cover: em tela cheia, o jogo desenha também na área do recorte
     da câmera (notch/furo) — sem isso o navegador deixa faixas pretas nas
     laterais em paisagem. Os controles usam env(safe-area-inset-*) no CSS
     para não ficarem embaixo da câmera. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Free Kick World ⚽</title>
<link rel="stylesheet" href="css/game.css" />
<!-- Fonte Rajdhani (mesma do Projeto Armor): usada no perfil recriado em código
     dentro das Configurações (SEU NOME / NÍVEL). Carregada SEM BLOQUEAR — o
     truque media="print" + onload aplica a fonte só quando ela chegar; até lá
     o texto usa a fonte padrão (display=swap). -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'" />
</head>
<body>
<canvas id="cv"></canvas>

<!-- Voltar para a Home -->
<button id="backBtn">← Voltar</button>

<!-- Gire o celular -->
<div id="rotate">
  <div class="phone"></div>
  <h2>VIRE O CELULAR</h2>
  <button id="rotateCancel" type="button">Cancelar</button>
</div>

<!-- HUD -->
<div id="hud">
  <div class="chip">⚽ GOLS: <span id="score">0</span></div>
  <div class="chip half" id="half" style="display:none">1º TEMPO</div>
  <div class="chip time">⏱ <span id="time">60</span></div>
</div>
<div id="msg"></div>

<!-- Controles -->
<div id="pad">
  <div id="zoom">
    <button id="camToggle">🔍 Perto</button>
  </div>
  <div id="stick"><div id="knob"></div></div>
  <div id="jump" class="actbtn">PULAR</div>
  <div id="kick" class="actbtn">CHUTAR</div>
</div>

<!-- TÍTULO / HOME (arte cheia do FKW + hotspots sobre os botões da tela) -->
<div id="scrTitle" class="screen">
  <div id="titleWrap">
    <img id="titleImg" src="assets/fkw-title.webp" alt="Free Kick World" decoding="async" fetchpriority="high" draggable="false" />
    <!-- Cada hotspot carrega uma cópia da arte (janela espelhada, .mirror):
         parada é invisível (pixels idênticos ao fundo); ao clicar, o botão
         salta/aumenta (animação .pop) dando retorno visual do toque. -->
    <!-- Menu à esquerda -->
    <!-- JOGAR / PERSONALIZAR / RANKING / VOLTAR / INICIAR: imagem PRÓPRIA de cada
         botão (PNG transparente, nova arte) sobreposta EXATAMENTE em cima do botão
         desenhado na arte. O encaixe em QUALQUER proporção de tela é garantido por
         JS (alignBtnArt em screens.js): o retângulo de cada botão, em pixels da
         arte 6400×2900, é projetado para a tela com a MESMA matemática do
         object-fit:cover do fundo. É este <img> que salta/brilha no efeito ONDA
         (setupMenuWave em screens.js: segurar/deslizar acende os botões em onda,
         igual ao Projeto Armor; toque limpo aciona a ação). -->
    <button class="hotspot" id="startGame"      aria-label="Jogar"><img class="btnimg" src="assets/btn-jogar.webp?v=2" alt="" draggable="false" /></button>
    <button class="hotspot" id="btnPersonaliza" aria-label="Personalizar"><img class="btnimg" src="assets/btn-personalizar.webp?v=2" alt="" draggable="false" /></button>
    <button class="hotspot" id="btnRanking"     aria-label="Ranking"><img class="btnimg" src="assets/btn-ranking.webp?v=2" alt="" draggable="false" /></button>
    <button class="hotspot" id="btnVoltar"      aria-label="Voltar"><img class="btnimg" src="assets/btn-voltar.webp?v=2" alt="" draggable="false" /></button>
    <!-- Cartões / ações à direita -->
    <button class="hotspot" id="btnEvento"      aria-label="Evento especial"><img class="mirror" src="assets/fkw-title.webp" alt="" draggable="false" /></button>
    <button class="hotspot" id="btnEstadio"     aria-label="Estádio"><img class="mirror" src="assets/fkw-title.webp" alt="" draggable="false" /></button>
    <button class="hotspot" id="startQuick"     aria-label="Iniciar partida rápida"><img class="btnimg" src="assets/btn-iniciar.webp?v=2" alt="" draggable="false" /></button>
    <!-- Topo / rodapé -->
    <button class="hotspot" id="btnAmigos"      aria-label="Amigos"><img class="mirror" src="assets/fkw-title.webp" alt="" draggable="false" /></button>
    <button class="hotspot" id="btnSettings"    aria-label="Configurações"><img class="mirror" src="assets/fkw-title.webp" alt="" draggable="false" /></button>
    <button class="hotspot" id="btnChat"        aria-label="Chat"><img class="mirror" src="assets/fkw-title.webp" alt="" draggable="false" /></button>

    <!-- HUD sobre a arte (não faz parte da imagem): retângulo de perfil no
         topo-esquerdo e os números de moeda/diamante ao lado dos ícones que já
         estão desenhados na arte. Posicionados por JS (alignHud em screens.js),
         com a MESMA projeção cover dos botões. -->
    <div id="fkwPerfil" class="fkw-hud">
      <div class="fkw-avatar">
        <!-- Mesmo nome/foto das Configurações (cfgPrefs.nome / Supabase
             usuarios.profile_picture_url) — atualizados juntos, ver screens.js. -->
        <img id="fkwFotoImg" alt="" style="display:none" draggable="false" />
        <svg id="fkwSilhueta" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="24" r="13" fill="#e8f2ff"/><path d="M10 57c0-13 10-19 22-19s22 6 22 19" fill="none" stroke="#e8f2ff" stroke-width="6" stroke-linecap="round"/></svg>
      </div>
      <div class="fkw-perfil-info">
        <div id="fkwNome" class="fkw-perfil-nome">FKW PLAYER</div>
        <div class="fkw-perfil-nivel">NÍVEL 0</div>
        <div class="fkw-perfil-xp"><div class="fkw-perfil-xp-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div id="fkwMoedas" class="fkw-hud fkw-count">0</div>
    <div id="fkwGemas"  class="fkw-hud fkw-count">0</div>
  </div>
  <!-- Aviso rápido "em breve" para as áreas ainda não implementadas -->
  <div id="toast"></div>
</div>

<!-- FIM -->
<div id="scrEnd" class="screen hidden">
  <h1 style="color:#fcd34d">FIM DE JOGO</h1>
  <h2 id="endScore">Você marcou 0 gols!</h2>
  <div class="row">
    <button class="btn" id="playAgain">JOGAR DE NOVO</button>
  </div>
</div>

<!-- RANKING (placeholder — conteúdo virá depois) -->
<div id="scrTabela" class="screen hidden">
  <h1 style="color:#7dd3fc">RANKING</h1>
  <h2>Em breve 🏆</h2>
  <p class="sub">A classificação vai aparecer aqui em breve.</p>
  <button class="btn ghost" id="tabelaBack">VOLTAR</button>
</div>

<!-- CONFIGURAÇÕES (arte cheia + controles reais por cima) -->
<!-- A arte fkw-settings.webp (6400×2900, mesma proporção da home) já traz
     desenhados o cabeçalho, o perfil (SEU NOME / NÍVEL), as linhas Idioma /
     E-mail / Notificações e os dois cartões de volume. O que é INTERATIVO é
     HTML de verdade sobreposto, posicionado por JS (alignCfg em screens.js)
     com a MESMA projeção cover dos botões da home: a seta do seletor de
     idioma, o interruptor de Notificações e as duas barras de volume. -->
<div id="scrSettings" class="screen hidden">
  <div id="cfgWrap">
    <img id="cfgImg" src="assets/fkw-settings.webp?v=3" alt="Configurações" loading="lazy" decoding="async" draggable="false" />
    <!-- Voltar: hotspot sobre a seta desenhada na arte (janela espelhada,
         igual aos cartões da home — parada é invisível; salta no .pop) -->
    <button class="hotspot" id="cfgVoltar" aria-label="Voltar"><img class="mirror" src="assets/fkw-settings.webp?v=3" alt="" draggable="false" /></button>
    <!-- Perfil recriado em CÓDIGO (a arte v2 deixa o painel do perfil vazio):
         avatar com anel + ícone de foto, SEU NOME com lápis e selo de NÍVEL —
         mesmos lugares/tamanhos em que eram desenhados na arte antiga. -->
    <div id="cfgAvatar" class="cfg-el">
      <!-- Anel clipado em círculo (só a foto/silhueta ficam aqui dentro) — o
           botão da câmera fica FORA deste wrapper, como um selo na borda,
           para não cobrir o rosto da foto. -->
      <div class="cfgp-ring">
        <!-- Foto real (Supabase, tabela `usuarios` — a MESMA conta/foto do
             AlpsPrime-OS e do Projeto Armor): escondida até carregar; se o
             jogador não tiver foto cadastrada, fica só a silhueta padrão. -->
        <img id="cfgFotoImg" class="cfgp-foto" alt="" style="display:none" draggable="false" />
        <svg id="cfgSilhueta" class="cfgp-silhueta" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="24" r="13" fill="#d9e8f7"/><path d="M10 57c0-13 10-19 22-19s22 6 22 19" fill="none" stroke="#d9e8f7" stroke-width="6" stroke-linecap="round"/></svg>
        <div id="cfgFotoCarregando" class="cfgp-carregando" style="display:none"><span class="cfgp-spinner"></span></div>
      </div>
      <button id="cfgFotoBtn" type="button" class="cfgp-cam" aria-label="Trocar foto de perfil">
        <svg viewBox="0 0 24 24" fill="#29d1ff"><path d="M9.2 4.4L7.9 6.3H4.9A2.2 2.2 0 0 0 2.7 8.5v9.2a2.2 2.2 0 0 0 2.2 2.2h14.2a2.2 2.2 0 0 0 2.2-2.2V8.5a2.2 2.2 0 0 0-2.2-2.2h-3l-1.3-1.9a1.5 1.5 0 0 0-1.2-.6h-3.2a1.5 1.5 0 0 0-1.2.6zM12 17.4a4.3 4.3 0 1 1 0-8.6 4.3 4.3 0 0 1 0 8.6z"/><circle cx="12" cy="13.1" r="2.5" fill="#0c1930"/></svg>
      </button>
      <input type="file" id="cfgFotoInput" accept="image/*" style="display:none" />
    </div>
    <div id="cfgNome" class="cfg-el">
      <input id="cfgNomeInput" type="text" placeholder="SEU NOME" maxlength="18" autocomplete="off" spellcheck="false" />
      <svg class="cfgp-lapis" viewBox="0 0 24 24" aria-hidden="true"><path fill="#8fe1ff" d="M16.2 2.9l1.5-1.5a2 2 0 0 1 2.8 0l2.1 2.1a2 2 0 0 1 0 2.8l-1.5 1.5-4.9-4.9z"/><path fill="#2f9bff" d="M14.9 4.2l4.9 4.9L8.9 20 2.5 21.5 4 15.1 14.9 4.2z"/></svg>
    </div>
    <!-- Nível: MESMO valor do cartão de perfil da home (fkwPerfil) — as duas
         telas refletem uma só fonte (aplicarNivel em screens.js). -->
    <div id="cfgNivel" class="cfg-el"><span>NÍVEL 0</span></div>
    <!-- E-mail da conta: a arte v3 deixa a linha vazia (só rótulo e cadeado);
         o valor é o e-mail REAL da sessão logada no Alps OS (mesma conta do
         Supabase — gameUser em persistence.js), preenchido por JS. -->
    <div id="cfgEmail" class="cfg-el"><span id="cfgEmailTexto"></span></div>
    <!-- Interruptor da linha "Notificações" -->
    <button id="cfgToggle" class="cfg-el on" role="switch" aria-checked="true" aria-label="Notificações"><span class="cfg-knob"></span></button>
    <!-- Barras de volume (trilha + bolinha + %) dentro dos cartões da arte -->
    <div id="cfgMusica" class="cfg-el cfg-slider">
      <div class="cfg-track"><div class="cfg-fill"></div><div class="cfg-knobbar"></div></div>
      <span class="cfg-pct">70%</span>
    </div>
    <div id="cfgEfeitos" class="cfg-el cfg-slider">
      <div class="cfg-track"><div class="cfg-fill"></div><div class="cfg-knobbar"></div></div>
      <span class="cfg-pct">85%</span>
    </div>
  </div>
</div>

<!-- Config do Supabase (gerada pelo Vite a partir das env do app) + cliente supabase-js -->
<script src="supabase-config.js"></script>
<script src="vendor/supabase.min.js"></script>

<!-- Jogo dividido por assunto. A ORDEM importa: cada arquivo usa o que os
     anteriores definiram (todos compartilham o mesmo escopo global). -->
<script src="js/core.js"></script>
<!-- Assets: um arquivo por imagem, com o MESMO nome do arquivo em assets/ -->
<script src="js/assets/_loader.js"></script>
<script src="js/assets/player_walk.js"></script>
<script src="js/assets/player_run.js"></script>
<script src="js/assets/player_kick.js"></script>
<script src="js/assets/player_jump.js"></script>
<script src="js/assets/pitch-grass.js"></script>
<script src="js/assets/goal-left.js"></script>
<script src="js/assets/goal-right.js"></script>
<script src="js/assets/ball.js"></script>
<script src="js/assets/player_idle.js"></script>
<script src="js/field.js"></script>
<script src="js/stadium.js"></script>
<script src="js/state.js"></script>
<script src="js/camera.js"></script>
<script src="js/screens.js"></script>
<script src="js/input.js"></script>
<script src="js/gameplay.js"></script>
<script src="js/render.js"></script>
<script src="js/persistence.js"></script>
<script src="js/loop.js"></script>
</body>
</html>
