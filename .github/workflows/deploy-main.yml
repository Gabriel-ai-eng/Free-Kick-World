# Publica na Vercel tudo o que entra na main.
#
# Contexto: neste projeto, a Vercel está configurada para publicar em PRODUÇÃO
# a partir da branch "claude/fkw-game-migration-az9oop" — e NÃO da main. Por
# isso, um push na main gerava só um "preview" e não atualizava o site.
#
# Este workflow resolve isso sem depender do painel da Vercel: a cada push na
# main, ele espelha a main nessa branch de produção. A Vercel detecta o push
# na branch de produção e publica. Assim, tudo o que você mandar para a main
# vai para produção automaticamente (inclusive push direto pelo GitHub).
#
# Obs.: a forma "oficial" de resolver é trocar a Production Branch para "main"
# em Settings → Git no projeto da Vercel. Enquanto isso não for feito, este
# espelho mantém main = produção.
name: Espelhar main na branch de produção da Vercel

on:
  push:
    branches: [main]

# O push para a branch de produção precisa de permissão de escrita no repo.
permissions:
  contents: write

# Se vários pushes chegarem juntos, roda um de cada vez (o último vence).
concurrency:
  group: espelhar-producao
  cancel-in-progress: false

jobs:
  espelhar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar a main (histórico completo)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Espelhar main → branch de produção
        run: git push origin HEAD:claude/fkw-game-migration-az9oop --force
